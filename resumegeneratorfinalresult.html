<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Resume</title>
    <link rel="stylesheet" href="resumegenerator.css">
    <link rel="stylesheet" href="resumegeneratorfinalresult.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.9.2/html2pdf.bundle.min.js" defer></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js" defer></script>
    <script src="resumegenerator.js" defer></script>
</head>
<body class="resumegeneratorfinalresult">
    <div class="result-container">
        <header class="result-header">
            <h1 class="headtitle">📄 RESUME GENERATED</h1>
            <p class="subtitle">Your professional resume is ready</p>
        </header>

        <div class="result-actions">
            <button id="downloadform" class="dwnldbtn">⬇ Download as PDF</button>
            <button class="gobackclick" onclick="gobackclick()">← Edit Resume</button>
        </div>

        <div class="displayinfo" id="resumeDisplay">
            <div class="resume-header">
                <img id="outImage" alt="Profile Photo" class="profile-image">
                <div class="resume-intro">
                    <h2 id="outName" class="resume-name">Name</h2>
                    <div class="resume-meta">
                        <span class="meta-item">📧 <span id="outEmail">email@example.com</span></span>
                        <span class="meta-item">📱 <span id="outPhone">+1 (555) 000-0000</span></span>
                        <span class="meta-item">📅 <span id="outBday">01/01/1990</span></span>
                    </div>
                </div>
            </div>

            <hr class="resume-divider">

            <!-- Education Section -->
            <div class="resume-section">
                <h3 class="resume-section-title">🎓 Education</h3>
                <p id="outEduc" class="resume-content">Education Level</p>
            </div>

            <!-- Skills Section -->
            <div class="resume-section">
                <h3 class="resume-section-title">💡 Skills</h3>
                <p id="outskills" class="resume-content">Skills List</p>
            </div>

            <!-- Experience Section -->
            <div class="resume-section">
                <h3 class="resume-section-title">💼 Work Experience</h3>
                <p id="outexperience" class="resume-content">Work Experience Details</p>
            </div>

            <!-- Accomplishments Section -->
            <div class="resume-section" id="accomplishmentSection">
                <h3 class="resume-section-title">🏆 Accomplishments</h3>
                <p id="outaccomplishment" class="resume-content">Accomplishments</p>
            </div>

            <!-- Certificate Section -->
            <div class="resume-section" id="certificateSection" style="display: none;">
                <h3 class="resume-section-title">📜 Credentials</h3>
                <div id="outcertificate" class="certificate-display"></div>
            </div>
        </div>
    </div>
</body>
</html>
